<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1200px;height:630px;background:#0A0A0A;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.grid{position:absolute;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(61,221,132,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(61,221,132,0.06) 1px,transparent 1px);background-size:64px 64px;}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(61,221,132,0.15) 0%,transparent 70%);}
.content{position:relative;z-index:1;text-align:center;padding:60px;}
.logo{font-family:monospace;font-size:72px;font-weight:700;color:#F0F0F0;letter-spacing:-2px;margin-bottom:24px;}
.logo span{color:#3DDD84;}
h1{font-size:48px;font-weight:700;color:#F0F0F0;line-height:1.2;margin-bottom:16px;letter-spacing:-1px;}
h1 span{color:#3DDD84;}
p{font-size:22px;color:#888;max-width:700px;margin:0 auto;}
.badge{display:inline-block;background:rgba(61,221,132,0.12);border:1px solid rgba(61,221,132,0.25);border-radius:100px;padding:8px 20px;font-size:16px;color:#3DDD84;font-family:monospace;letter-spacing:2px;margin-bottom:32px;}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<div class="content">
  <div class="badge">✦ NOW IN BETA</div>
  <div class="logo">AU<span>R</span>A</div>
  <h1>Der klügste Assistent,<br>den du je <span>haben wirst.</span></h1>
  <p>Proaktiver KI Agent mit Custom AI Agents, Personas per @mention und anpassbarem Interface.</p>
</div>
</body>
</html>
